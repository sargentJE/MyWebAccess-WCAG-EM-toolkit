# ============================================================================
# CI — runs on every push and pull request to main.
#
# Enforces the gate from ADR-0001: `npm run lint && npm run typecheck &&
# npm test` must be green on every commit. Also includes a non-blocking
# `npm audit --production` step. Coverage floors (70% src/lib, 50%
# src/commands) are an ADR-0001 target checked via `npm run test:coverage`;
# automated CI enforcement is an open board item.
#
# Node version follows .nvmrc (currently 22); CI uses the exact same minor.
# ============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node (engines + .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript check (JSDoc)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Non-blocking: surfaces known vulnerabilities without failing the build.
      - name: npm audit (production only, non-blocking)
        run: npm audit --omit=dev || true

  # Heavier e2e gate — runs after `checks` so a broken unit suite or
  # broken type definitions short-circuits before we spend cycles on
  # browser launches. Caches the Playwright browsers directory keyed
  # on the resolved Playwright version from package-lock.json.
  pipeline-smoke:
    name: Pipeline smoke (e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # Cache ~/.cache/ms-playwright across runs. The cache key contains
      # the Playwright version pulled from package-lock.json so a
      # dependency bump invalidates the cache automatically.
      - name: Resolve Playwright version
        id: playwright
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        run: npm run test:e2e
